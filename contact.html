<!--contact form -->
    <div class="container">

        <h1>Contact The School</h1>

        <div class="contact-form">

            <input type="text"
                   id="contactName"
                   placeholder="Your Name">

            <input type="email"
                   id="contactEmail"
                   placeholder="Your Email">

            <textarea id="contactMessage"
                      placeholder="Your Message"></textarea>

            <button id="sendMessageBtn">
                Send Message
            </button>

            <p id="contactResult"></p>

        </div>

    </div>
